<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="./assets/icons/fotogram_icon.svg" />
        <script src="script.js" defer></script>
        <link rel="stylesheet" href="fonts.css" />
        <link rel="stylesheet" href="style.css" />

        <title>Fotogram</title>
    </head>
    <body>
        <header>
            <div class="header_content">
                <img class="flower" src="./assets/icons/fotogram_icon.svg" />
                <img class="text" src="./assets/img/fotogram_header.png" />
            </div>
        </header>
        <div class="container">
            <main>
                <section class="gallery">
                    <h1>
                        Your personal <br />
                        photo album
                    </h1>
                    <div id="gallery_content" class="gallery_content"></div>
                    <div id="overlay">
                        <div id="lightbox">
                            <div class="lightbox_header">
                                <h2 id="lightbox_title"></h2>
                                <img
                                    id="closeBtn"
                                    src="./assets/icons/x 1=Default.svg"
                                    alt=""
                                />
                            </div>
                            <img id="lightbox_img" src="" alt="" />
                            <div class="lightbox_footer">
                                <button id="prevBtn">
                                    <img
                                        src="./assets/icons/Button_left.svg"
                                        alt=""
                                    />
                                </button>
                                <span id="image_counter"> 1 / 12 </span>
                                <button id="nextBtn">
                                    <img
                                        src="./assets/icons/Button_right.svg"
                                        alt=""
                                    />
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
        <footer>
            <div class="footer_da_logo">
                <img src="./assets/icons/Icon_da.svg" />
                <img src="./assets/icons/Text_da.svg" />
            </div>
            <div class="footer_text">
                <img src="./assets/icons/© 2023 Developer Akademie GmbH.svg" />
            </div>
        </footer>
    </body>
</html>
